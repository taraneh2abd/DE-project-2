services:
  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - sparknet

  spark-master:
    image: apache/spark:3.5.1-python3
    container_name: spark-master
    user: root
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
      --host spark-master --port 7077 --webui-port 8080
    ports:
      - "7077:7077"
      - "8080:8080"
      - "4040:4040"
    volumes:
      - ./jobs:/opt/spark-jobs
      - ./data:/opt/spark-data
    networks:
      - sparknet

  spark-worker:
    image: apache/spark:3.5.1-python3
    container_name: spark-worker
    user: root
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker
      spark://spark-master:7077 --memory 2G --cores 2
    volumes:
      - ./jobs:/opt/spark-jobs
      - ./data:/opt/spark-data
    depends_on:
      - spark-master
    networks:
      - sparknet

networks:
  sparknet:
    driver: bridge

volumes:
  minio_data: